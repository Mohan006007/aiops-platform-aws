name: Deploy AIOps App v2

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1

    - name: Login to ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build Docker image
      run: |
        docker build -t aiops-app -f docker/Dockerfile .

    - name: Tag image
      run: |
        docker tag aiops-app:latest ${{ steps.login-ecr.outputs.registry }}/aiops-app:latest

    - name: Push image
      run: |
        docker push ${{ steps.login-ecr.outputs.registry }}/aiops-app:latest

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig --name aiops-cluster --region ap-south-1

- name: Deploy to EKS
  run: |
    kubectl set image deployment/aiops-app aiops-container=${{ steps.login-ecr.outputs.registry }}/aiops-app:latest

- name: Wait for rollout
  run: |
    kubectl rollout status deployment/aiops-app --timeout=60s

- name: Rollback if failed
  if: failure()
  run: |
    echo "Deployment failed, rolling back..."
    kubectl rollout undo deployment/aiops-app