apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiops-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aiops
  template:
    metadata:
      labels:
        app: aiops
    spec:
      containers:
      - name: aiops-container
        image: 823557602257.dkr.ecr.ap-south-1.amazonaws.com/aiops-app:v5
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
        - containerPort: 8000

        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5

        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10