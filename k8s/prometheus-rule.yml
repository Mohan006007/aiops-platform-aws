apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: aiops-alerts
  labels:
    release: monitoring
spec:
  groups:
  - name: aiops.rules
    rules:
    - alert: HighCPUUsage
      expr: cpu_usage > 80
      for: 1m
      labels:
        severity: critical
      annotations:
        description: "CPU usage high"
